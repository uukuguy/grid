name: Desktop CI

on:
  pull_request:
    paths:
      - 'crates/grid-desktop/**'
      - 'crates/grid-cli/**'
      - 'crates/grid-engine/**'
  push:
    branches: [main]
    paths:
      - 'crates/grid-desktop/**'
      - '.github/workflows/desktop-ci.yml'
  workflow_dispatch:

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-desktop-${{ hashFiles('**/Cargo.lock') }}

      - name: Check compilation
        run: cargo check -p grid-desktop

      - name: Run tests
        run: cargo test -p grid-desktop
